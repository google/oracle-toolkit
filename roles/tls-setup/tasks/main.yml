---
- name: tls-setup | Define Version Specific Wallet Directory for 19c
  set_fact:
    tls_wallet_dir: "{{ oracle_base }}/admin/{{ ora_db_name }}/wallet"
  when: "'19.' in oracle_home"

- name: tls-setup | Define Version Specific Wallet Directory for modern
  set_fact:
    tls_wallet_dir: "{{ oracle_base }}/admin/{{ ora_db_name }}/wallet_root/tls"
  when: "'19.' not in oracle_home"

- name: tls-setup | Create TLS Wallet Directory
  file:
    path: "{{ tls_wallet_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0700'

- name: tls-setup | Retrieve Node Specific TLS Secret
  shell: "gcloud --quiet secrets versions access latest --secret='{{ ansible_hostname }}-tls-secret'"
  register: tls_secret_raw
  become: true
  become_user: "{{ oracle_user }}"
  changed_when: false
  no_log: true

- name: tls-setup | Write Parsed TLS Artifacts to Disk
  copy:
    content: "{{ item.content }}"
    dest: "{{ tls_wallet_dir }}/{{ item.dest }}"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  no_log: true
  become: true
  become_user: "{{ oracle_user }}"
  loop:
    - { dest: 'key.pem', content: "{{ (tls_secret_raw.stdout | from_json).key }}" }
    - { dest: 'cert.pem', content: "{{ (tls_secret_raw.stdout | from_json).cert }}" }

- name: tls-setup | Create PKCS12 Keystore Intermediate
  shell: >
    openssl pkcs12 -export -in "{{ tls_wallet_dir }}/cert.pem"
    -inkey "{{ tls_wallet_dir }}/key.pem"
    -out "{{ tls_wallet_dir }}/intermediate.p12"
    -name "oracle-db-server"
    -passout pass:"$WALLET_PWD"
  args:
    creates: "{{ tls_wallet_dir }}/intermediate.p12"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Create Empty Oracle Wallet
  shell: >
    orapki wallet create -wallet "{{ tls_wallet_dir }}" -pwd "$WALLET_PWD"
  args:
    creates: "{{ tls_wallet_dir }}/ewallet.p12"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Import PKCS12 into Oracle Wallet
  shell: >
    orapki wallet import_pkcs12 -wallet "{{ tls_wallet_dir }}"
    -pkcs12file "{{ tls_wallet_dir }}/intermediate.p12"
    -pwd "$WALLET_PWD" -pkcs12pwd "$WALLET_PWD"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Create Oracle Auto Login Wallet
  shell: >
    orapki wallet create -wallet "{{ tls_wallet_dir }}" -auto_login -pwd "$WALLET_PWD"
  args:
    creates: "{{ tls_wallet_dir }}/cwallet.sso"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Find all files in wallet directory
  find:
    path: "{{ tls_wallet_dir }}"
  register: wallet_files

- name: tls-setup | Explicitly Secure All Wallet Files
  file:
    path: "{{ item.path }}"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  loop: "{{ wallet_files.files }}"

- name: tls-setup | Add IPC endpoint to existing standard LISTENER
  lineinfile:
    path: "{{ oracle_home }}/network/admin/listener.ora"
    regexp: 'LISTENER_IPC'
    insertafter: '\(PROTOCOL = TCP\)'
    line: '            (ADDRESS = (PROTOCOL = IPC)(KEY = LISTENER_IPC))'
    state: present
  register: listener_ipc_update

- name: tls-setup | Append TCPS configuration to listener configuration
  blockinfile:
    path: "{{ oracle_home }}/network/admin/listener.ora"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TLS LISTENER"
    insertafter: EOF
    backup: yes
    block: |
      LISTENER_TCPS =
        (DESCRIPTION =
          (ADDRESS = (PROTOCOL = TCPS)(HOST = {{ ansible_fqdn }})(PORT = {{ tls_listener_port }}))
          (ADDRESS = (PROTOCOL = IPC)(KEY = LISTENER_TCPS_IPC))
        )
      
      WALLET_LOCATION =
        (SOURCE =
          (METHOD = FILE)
          (METHOD_DATA =
            (DIRECTORY = {{ tls_wallet_dir }})
          )
        )
      
      SSL_CLIENT_AUTHENTICATION = FALSE
  register: listener_update

- name: tls-setup | Append TLS Configuration to sqlnet configuration
  blockinfile:
    path: "{{ oracle_home }}/network/admin/sqlnet.ora"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - TLS WALLET"
    insertafter: EOF
    backup: yes
    block: |
      WALLET_LOCATION =
        (SOURCE =
          (METHOD = FILE)
          (METHOD_DATA =
            (DIRECTORY = {{ tls_wallet_dir }})
          )
        )
      SSL_CLIENT_AUTHENTICATION = FALSE
  register: sqlnet_update

- name: tls-setup | Start and Reload Listeners
  shell: |
    {{ oracle_home }}/bin/lsnrctl reload LISTENER
    {{ oracle_home }}/bin/lsnrctl start LISTENER_TCPS
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
  when: listener_update.changed or sqlnet_update.changed or listener_ipc_update.changed

- name: tls-setup | Update local_listener for dynamic registration
  shell: |
    {{ oracle_home }}/bin/sqlplus -s / as sysdba <<EOF
    ALTER SYSTEM SET LOCAL_LISTENER='(ADDRESS_LIST=(ADDRESS=(PROTOCOL=IPC)(KEY=LISTENER_IPC))(ADDRESS=(PROTOCOL=IPC)(KEY=LISTENER_TCPS_IPC)))' SCOPE=BOTH;
    EXIT;
    EOF
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ ora_db_name }}"

- name: tls-setup | Capture TCPS Listener Status
  shell: "{{ oracle_home }}/bin/lsnrctl status LISTENER_TCPS"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
  register: listener_status
  changed_when: false

- name: tls-setup | Show Listener Status
  debug:
    var: listener_status.stdout_lines
    
- name: tls-setup | Create Extract Script
  copy:
    content: |
      import sys
      import re

      with open(sys.argv[1]) as f:
          content = f.read()

      blocks = re.findall(r"-----BEGIN CERTIFICATE-----.*?-----END CERTIFICATE-----", content, re.DOTALL)

      if blocks:
          print(blocks[-1].strip())
      else:
          sys.exit("No certificates found in " + sys.argv[1])
    dest: "{{ tls_wallet_dir }}/extract_root_ca.py"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0700'
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Extract Root CA Certificate from cert.pem
  shell: "python3 {{ tls_wallet_dir }}/extract_root_ca.py {{ tls_wallet_dir }}/cert.pem > {{ tls_wallet_dir }}/root-ca.pem"
  become: true
  become_user: "{{ oracle_user }}"
  args:
    creates: "{{ tls_wallet_dir }}/root-ca.pem"

- name: tls-setup | Apply Strict Permissions to Extracted Root CA
  file:
    path: "{{ tls_wallet_dir }}/root-ca.pem"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  become: true
  become_user: root

- name: tls-setup | Delete Extract Script
  file:
    path: "{{ tls_wallet_dir }}/extract_root_ca.py"
    state: absent
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Create Temporary Client Bundle Staging Directory
  file:
    path: "{{ tls_wallet_dir }}/client_bundle_staging"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0700'
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Copy Root CA to Staging Directory
  copy:
    src: "{{ tls_wallet_dir }}/root-ca.pem"
    dest: "{{ tls_wallet_dir }}/client_bundle_staging/root-ca.pem"
    remote_src: yes
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Create Empty Client Oracle Wallet
  shell: >
    orapki wallet create -wallet "{{ tls_wallet_dir }}/client_bundle_staging" -pwd "$WALLET_PWD"
  args:
    creates: "{{ tls_wallet_dir }}/client_bundle_staging/ewallet.p12"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Import Root CA as Trusted Certificate into Client Oracle Wallet
  shell: >
    orapki wallet add -wallet "{{ tls_wallet_dir }}/client_bundle_staging"
    -trusted_cert -cert "{{ tls_wallet_dir }}/client_bundle_staging/root-ca.pem"
    -pwd "$WALLET_PWD"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Create Client Auto Login Wallet
  shell: >
    orapki wallet create -wallet "{{ tls_wallet_dir }}/client_bundle_staging" -auto_login -pwd "$WALLET_PWD"
  args:
    creates: "{{ tls_wallet_dir }}/client_bundle_staging/cwallet.sso"
  become: true
  become_user: "{{ oracle_user }}"
  environment:
    ORACLE_HOME: "{{ oracle_home }}"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
    WALLET_PWD: "{{ (tls_secret_raw.stdout | from_json).pwd }}"
  no_log: true

- name: tls-setup | Create Zip Script
  copy:
    content: |
      import zipfile
      import os
      import sys

      files = ["root-ca.pem", "cwallet.sso", "ewallet.p12"]
      staging_dir = sys.argv[1]
      zip_path = sys.argv[2]

      try:
          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
              for f in files:
                  full_path = os.path.join(staging_dir, f)
                  if os.path.exists(full_path):
                      zf.write(full_path, f)
                      print(f"Added {f} to zip")
                  else:
                      raise FileNotFoundError(f"Required file missing: {full_path}")
          print(f"Successfully generated {zip_path}")
      except Exception as e:
          if os.path.exists(zip_path):
              os.remove(zip_path)
          sys.exit(str(e))
    dest: "{{ tls_wallet_dir }}/generate_client_zip.py"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0700'
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Pre-emptively Remove Existing Client Bundle Zip
  file:
    path: "/home/oracle/client_bundle.zip"
    state: absent
  become: true
  become_user: root

- name: tls-setup | Generate Client Bundle Zip for easy download
  shell: "python3 {{ tls_wallet_dir }}/generate_client_zip.py {{ tls_wallet_dir }}/client_bundle_staging /home/oracle/client_bundle.zip"
  become: true
  become_user: "{{ oracle_user }}"
  register: client_bundle_zip_result

- name: tls-setup | Delete Zip Script
  file:
    path: "{{ tls_wallet_dir }}/generate_client_zip.py"
    state: absent
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Apply Strict Permissions to Client Bundle Zip
  file:
    path: "/home/oracle/client_bundle.zip"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0600'
  become: true
  become_user: root

- name: tls-setup | Clean Up Temporary Staging Directory
  file:
    path: "{{ tls_wallet_dir }}/client_bundle_staging"
    state: absent
  become: true
  become_user: "{{ oracle_user }}"

- name: tls-setup | Verify Client Bundle Zip Exists
  stat:
    path: "/home/oracle/client_bundle.zip"
  register: client_bundle_stat
  become: true
  become_user: root

- name: tls-setup | Fail if Client Bundle Zip is Missing or Empty
  fail:
    msg: "Expected /home/oracle/client_bundle.zip to be present and non-empty."
  when: >
    not client_bundle_stat.stat.exists or
    not client_bundle_stat.stat.isreg or
    client_bundle_stat.stat.size == 0

