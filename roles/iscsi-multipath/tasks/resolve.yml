---
# Read-only resolution of this host's effective iSCSI settings from the GCNV
# host map (or explicit overrides). Shared by main.yml (deploy) and
# drift_check.yml (validate) so resolution logic lives in exactly one place.

- name: iscsi-multipath | Normalize raw GCNV host map source
  ansible.builtin.set_fact:
    _gcnv_host_map_raw: >-
      {{
        gcnv_host_map
        if ((gcnv_host_map | default({})) | length > 0)
        else (gcnv_host_map_json | default({}))
      }}
  tags: [iscsi-multipath, gcnv-drift]

# install-oracle.sh may deliver the map as a dict (inline YAML/JSON) or as a
# JSON string that picked up stray surrounding quotes from shell word-splitting.
# Accept both forms.
- name: iscsi-multipath | Use GCNV host map directly if already decoded
  ansible.builtin.set_fact:
    _gcnv_host_map: "{{ _gcnv_host_map_raw }}"
  when: _gcnv_host_map_raw is mapping
  tags: [iscsi-multipath, gcnv-drift]

- name: iscsi-multipath | Decode GCNV host map if string
  ansible.builtin.set_fact:
    _gcnv_host_map: >-
      {{
        _gcnv_host_map_raw | string | trim
        | regex_replace("^['\"]", "") | regex_replace("['\"]$", "")
        | from_json
      }}
  when: _gcnv_host_map_raw is not mapping
  tags: [iscsi-multipath, gcnv-drift]

- name: iscsi-multipath | Select this host's GCNV entry
  ansible.builtin.set_fact:
    _gcnv_entry: "{{ _gcnv_host_map[inventory_hostname] | default({}) }}"
  tags: [iscsi-multipath, gcnv-drift]

- name: iscsi-multipath | Resolve effective iSCSI settings (GCNV map > explicit vars)
  ansible.builtin.set_fact:
    iscsi_portals_effective: >-
      {{
        _gcnv_entry.portals | default(
          (iscsi_portals_by_host | default({}))[inventory_hostname]
          | default(
              (iscsi_portals | default([]))
              if ((iscsi_portals | default([])) is iterable and (iscsi_portals | default([])) is not string)
              else ((iscsi_portals | default('')) | string | split(',') | map('trim') | select('!=', '') | list)
            )
        )
      }}
    iscsi_multipath_aliases_effective: "{{ _gcnv_entry.multipath_aliases | default(iscsi_multipath_aliases | default([])) }}"
  tags: [iscsi-multipath, gcnv-drift]
